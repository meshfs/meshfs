name: apple-containerization-smoke-reusable

on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner label
        required: true
        type: string

jobs:
  apple-containerization-smoke:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build integration binaries
        run: cargo build -p meshfs -p meshfs-control-plane

      - name: Run Apple containerization smoke
        env:
          MESHFS_TEST_STRICT: "1"
          MESHFS_TEST_CLIENT_BIN: ${{ github.workspace }}/target/debug/meshfs
          MESHFS_TEST_SERVER_BIN: ${{ github.workspace }}/target/debug/meshfs-control-plane
        run: scripts/ci/run_apple_containerization_smoke.sh
