name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test
        run: cargo test --workspace

      - name: Shell syntax checks
        run: |
          bash -n scripts/deploy-provider.sh
          bash -n scripts/deploy-cloudflare.sh
          bash -n scripts/providers/deploy-cloudflare-workers-free-tier.sh
