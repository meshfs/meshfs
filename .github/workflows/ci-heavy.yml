name: ci-heavy

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_fuse_linux:
        description: "Run Linux FUSE smoke"
        type: boolean
        default: true
      run_fuse_macos:
        description: "Run macOS FUSE smoke"
        type: boolean
        default: true
      run_apple_containerization:
        description: "Run Apple containerization smoke"
        type: boolean
        default: true

jobs:
  fuse-linux-smoke:
    name: fuse-linux-smoke
    if: ${{ github.event_name == 'schedule' || inputs.run_fuse_linux }}
    uses: ./.github/workflows/_fuse-smoke-reusable.yml
    with:
      runs-on: ubuntu-latest
      platform: linux

  fuse-macos-smoke:
    name: fuse-macos-smoke
    if: ${{ github.event_name == 'schedule' || inputs.run_fuse_macos }}
    uses: ./.github/workflows/_fuse-smoke-reusable.yml
    with:
      runs-on: macos-latest
      platform: macos

  apple-containerization-smoke:
    name: apple-containerization-smoke
    if: ${{ github.event_name == 'schedule' || inputs.run_apple_containerization }}
    uses: ./.github/workflows/_apple-containerization-smoke-reusable.yml
    with:
      runs-on: macos-latest
