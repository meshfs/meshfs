name: ci-coverage

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  coverage-linux:
    name: coverage-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install llvm tools
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Coverage summary
        run: cargo llvm-cov --workspace --exclude meshfs-integration-tests --summary-only

      - name: Generate lcov report
        run: |
          mkdir -p target/coverage
          cargo llvm-cov --workspace --exclude meshfs-integration-tests --lcov --output-path target/coverage/lcov.info

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: target/coverage/lcov.info
