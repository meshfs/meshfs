name: ci-pr

on:
  pull_request:
  push:

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-linux:
    name: unit-linux
    uses: ./.github/workflows/_unit-reusable.yml
    with:
      runs-on: ubuntu-latest
      run-format-check: true
      run-deploy-help: true

  unit-macos:
    name: unit-macos
    uses: ./.github/workflows/_unit-reusable.yml
    with:
      runs-on: macos-latest
      run-format-check: false
      run-deploy-help: false

  integration-linux-core:
    name: integration-linux-core
    needs: unit-linux
    uses: ./.github/workflows/_integration-reusable.yml
    with:
      runs-on: ubuntu-latest
      test-target: core
      artifact-name: integration-linux-core-artifacts

  integration-linux-sync-ws:
    name: integration-linux-sync-ws
    needs: unit-linux
    uses: ./.github/workflows/_integration-reusable.yml
    with:
      runs-on: ubuntu-latest
      test-target: sync_ws_resume
      artifact-name: integration-linux-sync-ws-artifacts

  integration-macos-core:
    name: integration-macos-core
    needs: unit-macos
    uses: ./.github/workflows/_integration-reusable.yml
    with:
      runs-on: macos-latest
      test-target: core
      artifact-name: integration-macos-core-artifacts

  integration-macos-sync-ws:
    name: integration-macos-sync-ws
    needs: unit-macos
    uses: ./.github/workflows/_integration-reusable.yml
    with:
      runs-on: macos-latest
      test-target: sync_ws_resume
      artifact-name: integration-macos-sync-ws-artifacts

  integration-linux-minio-docker:
    name: integration-linux-minio-docker
    needs: unit-linux
    uses: ./.github/workflows/_minio-integration-reusable.yml
    with:
      suite: happy
      artifact-name: integration-linux-minio-docker-artifacts

  integration-linux-minio-failures:
    name: integration-linux-minio-failures
    needs: unit-linux
    uses: ./.github/workflows/_minio-integration-reusable.yml
    with:
      suite: failures
      artifact-name: integration-linux-minio-failures-artifacts
